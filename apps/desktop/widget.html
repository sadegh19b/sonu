<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SONU Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    }

    .widget {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      /* Ultra-transparent glassmorphism - elegant floating design */
      background: rgba(15, 15, 20, 0.25);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 0 80px rgba(99, 102, 241, 0.08);
      -webkit-app-region: drag;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: fit-content;
      max-width: 90vw;
    }

    .widget:hover {
      background: rgba(15, 15, 20, 0.35);
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 0 100px rgba(99, 102, 241, 0.12);
    }

    /* Cancel Button */
    .widget-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: all 0.2s ease;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.6);
      font-size: 18px;
      line-height: 1;
    }

    .widget-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.9);
      transform: scale(1.1);
    }

    .widget-btn:active {
      transform: scale(0.9);
    }

    /* Waveform Animation */
    .widget-waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 24px;
      padding: 0 4px;
    }

    .wave-bar {
      width: 3px;
      border-radius: 3px;
      background: linear-gradient(180deg, #94a3b8 0%, #8b5cf6 100%);
      animation: wave 1.2s ease-in-out infinite;
      opacity: 0.8;
      height: 100%;
    }

    .wave-bar:nth-child(1) { height: 8px; animation-delay: 0.0s; }
    .wave-bar:nth-child(2) { height: 16px; animation-delay: 0.15s; }
    .wave-bar:nth-child(3) { height: 22px; animation-delay: 0.3s; }
    .wave-bar:nth-child(4) { height: 14px; animation-delay: 0.45s; }
    .wave-bar:nth-child(5) { height: 10px; animation-delay: 0.6s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    /* Processing State */
    .widget.processing .wave-bar {
      background: linear-gradient(180deg, #a78bfa 0%, #7c3aed 100%);
      animation: pulse 0.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scaleY(0.6); opacity: 0.7; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    /* Status Text */
    .widget-status {
      font-size: 13px;
      font-weight: 500;
      color: #e2e8f0;
      white-space: nowrap;
      letter-spacing: -0.2px;
    }

    /* Preview Text */
    .widget-preview {
      max-width: 200px;
      overflow: hidden;
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      padding-left: 12px;
      margin-left: 4px;
      transition: all 0.3s ease;
    }

    .preview-text {
      font-size: 13px;
      color: #94a3b8;
      white-space: nowrap;
      display: block;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    /* Done State */
    .widget-checkmark {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .widget-checkmark svg {
      width: 20px;
      height: 20px;
      stroke: #10b981;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Transitions */
    .widget.done .widget-waveform,
    .widget.done .widget-status,
    .widget.done .widget-btn,
    .widget.done .widget-preview {
      display: none !important;
    }

    .widget.done {
      padding: 10px;
      gap: 0;
    }

    .widget.done .widget-status {
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="widget" id="widget">
    <button class="widget-btn widget-btn-cancel" id="cancel-btn" title="Cancel">×</button>

    <div class="widget-waveform" id="waveform">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>

    <span class="widget-status" id="widget-status">Listening...</span>

    <div class="widget-preview" id="widget-preview" style="display: none;">
      <span class="preview-text" id="preview-text"></span>
    </div>

    <div class="widget-checkmark" id="widget-checkmark" style="display: none;">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  </div>

  <script>
    const widget = document.getElementById('widget');
    const statusText = document.getElementById('widget-status');
    const previewContainer = document.getElementById('widget-preview');
    const previewText = document.getElementById('preview-text');
    const checkmark = document.getElementById('widget-checkmark');
    const cancelBtn = document.getElementById('cancel-btn');

    // Expose state change function
    window.setWidgetState = (state) => {
      widget.classList.remove('recording', 'processing', 'done');
      checkmark.style.display = 'none';

      if (state === 'processing') {
        widget.classList.add('processing');
        statusText.innerText = 'Processing...';
        previewContainer.style.display = 'none';
      } else if (state === 'done') {
        widget.classList.add('done');
        checkmark.style.display = 'flex';

        // Auto-hide after done state
        setTimeout(() => {
          if (window.widgetApp && window.widgetApp.hide) {
            window.widgetApp.hide();
          }
        }, 800);
      } else {
        // recording state
        widget.classList.add('recording');
        statusText.innerText = 'Listening...';
      }
    };

    // Support for live preview text updates
    window.setPreviewText = (text) => {
      if (text && text.trim().length > 0) {
        previewText.innerText = text;
        previewContainer.style.display = 'block';
      } else {
        previewContainer.style.display = 'none';
      }
    };

    // Cancel button handler
    cancelBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (window.widgetApp && window.widgetApp.cancelRecording) {
        window.widgetApp.cancelRecording();
      }
    });
  </script>
</body>
</html>
