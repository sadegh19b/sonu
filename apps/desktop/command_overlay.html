<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SONU Command</title>
  <link rel="stylesheet" href="command_overlay.css">
</head>
<body>
  <div class="command-container">
    <div class="input-row">
      <div class="icon">✨</div>
      <input type="text" id="command-input" placeholder="Ask AI to rewrite, summarize, or edit..." autofocus>
      <div class="mic-icon" id="mic-icon">🎤</div>
    </div>
    <div class="preview-area hidden" id="preview-area">
      <div class="label">Preview</div>
      <div class="content" id="preview-content"></div>
      <div class="actions">
        <button class="btn-cancel" id="btn-cancel">Esc</button>
        <button class="btn-apply" id="btn-apply">↵ Apply</button>
      </div>
    </div>
    <div class="status-bar" id="status-bar">Ready</div>
  </div>
  <script src="command_overlay.js"></script>
</body>
</html>
