services:
  sonu-transcription:
    build:
      context: .
      args:
        WHISPER_MODEL: large-v3
    container_name: sonu-transcription-server
    ports:
      - "8000:8000"
    environment:
      - WHISPER_MODEL=large-v3
      - DEVICE=cpu
      - COMPUTE_TYPE=int8
      - API_KEY=  # Set to require authentication
    volumes:
      # Cache models between restarts
      - whisper-models:/root/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

volumes:
  whisper-models:
