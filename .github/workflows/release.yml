name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
  build-desktop:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          npm ci
          pip install -r requirements.txt
      
      - name: Run linting
        run: npm run lint
      
      - name: Run unit tests
        run: npm run test
        continue-on-error: true
      
      - name: Build application
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.zip
          if-no-files-found: warn

  build-tauri:
    name: Build Tauri (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    
    defaults:
      run:
        working-directory: apps/tauri-v2
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/tauri-v2/package-lock.json
      
      - name: Setup Rust
        uses: dtolnay/rust-action@stable
      
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install frontend dependencies
        run: bun install
      
      - name: Run linting
        run: bun run lint
      
      - name: Type check
        run: bun run typecheck
      
      - name: Run Rust tests
        run: |
          cd src-tauri
          cargo test
      
      - name: Build Tauri app
        run: bun run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}
          path: |
            apps/tauri-v2/src-tauri/target/release/bundle/**/*.msi
            apps/tauri-v2/src-tauri/target/release/bundle/**/*.exe
            apps/tauri-v2/src-tauri/target/release/bundle/**/*.dmg
            apps/tauri-v2/src-tauri/target/release/bundle/**/*.AppImage
            apps/tauri-v2/src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [build-desktop, build-tauri]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
