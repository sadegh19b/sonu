name: CI - Desktop App

on:
  push:
    branches: [main]
    paths:
      - 'apps/tauri/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/tauri/**'

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/tauri/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev

      - name: Install frontend dependencies
        working-directory: apps/tauri
        run: npm ci

      - name: Check TypeScript
        working-directory: apps/tauri
        run: npm run build

      - name: Check Rust
        working-directory: apps/tauri/src-tauri
        run: cargo check

      - name: Run Rust tests
        working-directory: apps/tauri/src-tauri
        run: cargo test

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev

      - name: Check formatting
        working-directory: apps/tauri/src-tauri
        run: cargo fmt --check

      - name: Run clippy
        working-directory: apps/tauri/src-tauri
        run: cargo clippy -- -D warnings
