name: Release Desktop App

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.1.0)'
        required: true
        default: 'v2.1.0'

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            args: ''
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/tauri-v2/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev

      - name: Install frontend dependencies
        working-directory: apps/tauri-v2
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/tauri-v2
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'SONU Desktop ${{ github.ref_name }}'
          releaseBody: 'See the assets below for downloads.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sonu-desktop-${{ matrix.target }}
          path: |
            apps/tauri-v2/src-tauri/target/*/release/bundle/**/*
            apps/tauri-v2/src-tauri/target/release/bundle/**/*
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Read changelog
        id: changelog
        run: |
          if [ -f "apps/tauri-v2/CHANGELOG.md" ]; then
            # Extract latest version section
            CHANGELOG=$(awk '/^## /{if(p)exit; p=1} p' apps/tauri-v2/CHANGELOG.md)
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "content=See assets below for downloads." >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: SONU Desktop ${{ steps.version.outputs.version }}
          body: |
            ## SONU Desktop v${{ steps.version.outputs.version }}
            
            ### Downloads
            
            | Platform | Download |
            |----------|----------|
            | Windows (x64) | `.msi` or `.exe` |
            | macOS (Intel) | `-x64.dmg` |
            | macOS (Apple Silicon) | `-aarch64.dmg` |
            | Linux (x64) | `.AppImage` or `.deb` |
            
            ### Changelog
            ${{ steps.changelog.outputs.content }}
            
            ---
            *Based on [Handy.computer](https://github.com/cjpais/Handy) with SONU customizations*
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
