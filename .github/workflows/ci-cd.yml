name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  # ==========================================
  # Code Quality Checks
  # ==========================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            apps/tauri-v2/package.json
            apps/desktop/package.json

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install dependencies (Tauri)
        working-directory: apps/tauri-v2
        run: |
          npm install -g bun
          bun install

      - name: Install dependencies (Legacy)
        working-directory: apps/desktop
        run: npm install

      - name: Run ESLint (Tauri)
        working-directory: apps/tauri-v2
        run: bun run lint

      - name: Run Prettier check (Tauri)
        working-directory: apps/tauri-v2
        run: bun run format:check

      - name: Run TypeScript check (Tauri)
        working-directory: apps/tauri-v2
        run: bun run typecheck

      - name: Run Rust fmt check
        working-directory: apps/tauri-v2/src-tauri
        run: cargo fmt -- --check

      - name: Run Clippy
        working-directory: apps/tauri-v2/src-tauri
        run: cargo clippy -- -D warnings

      - name: Run ESLint (Legacy)
        working-directory: apps/desktop
        run: npm run lint || true

  # ==========================================
  # Unit Tests
  # ==========================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [tauri-v2, desktop]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        if: matrix.app == 'tauri-v2'
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: |
          if [ "${{ matrix.app }}" == "tauri-v2" ]; then
            npm install -g bun
            bun install
          else
            npm install
          fi

      - name: Run frontend tests (Tauri)
        if: matrix.app == 'tauri-v2'
        working-directory: apps/tauri-v2
        run: bun run test

      - name: Run Rust tests (Tauri)
        if: matrix.app == 'tauri-v2'
        working-directory: apps/tauri-v2/src-tauri
        run: cargo test --verbose

      - name: Run unit tests (Legacy)
        if: matrix.app == 'desktop'
        working-directory: apps/desktop/tests
        run: npm run test:unit || true

  # ==========================================
  # Integration Tests
  # ==========================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        working-directory: apps/tauri-v2
        run: |
          npm install -g bun
          bun install

      - name: Run integration tests
        working-directory: apps/tauri-v2
        run: bun run test:e2e || true

  # ==========================================
  # Security Scanning
  # ==========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit (Tauri)
        working-directory: apps/tauri-v2
        run: npm audit --audit-level=moderate || true

      - name: Run npm audit (Legacy)
        working-directory: apps/desktop
        run: npm audit --audit-level=moderate || true

      - name: Run cargo audit (Tauri)
        working-directory: apps/tauri-v2/src-tauri
        run: |
          cargo install cargo-audit
          cargo audit || true

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript, rust

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ==========================================
  # Build Matrix
  # ==========================================
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: [code-quality, unit-tests, security-scan]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-intel
            os: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-arm
            os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        working-directory: apps/tauri-v2
        run: |
          npm install -g bun
          bun install

      - name: Build Tauri app
        working-directory: apps/tauri-v2
        run: bun run tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sonu-${{ matrix.platform }}
          path: |
            apps/tauri-v2/src-tauri/target/${{ matrix.target }}/release/bundle/**

  # ==========================================
  # Release
  # ==========================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sonu-*

      - name: Display structure
        run: ls -R artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # Performance Benchmarks
  # ==========================================
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install cargo-criterion
        run: cargo install cargo-criterion

      - name: Run benchmarks
        working-directory: apps/tauri-v2/src-tauri
        run: cargo bench || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: apps/tauri-v2/src-tauri/target/criterion/
