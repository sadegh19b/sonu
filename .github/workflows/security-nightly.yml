name: Nightly Security Scan

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch:

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Run npm audit (Tauri)
        working-directory: apps/tauri-v2
        run: |
          npm install
          npm audit --audit-level=low
        continue-on-error: true

      - name: Run npm audit (Legacy)
        working-directory: apps/desktop
        run: |
          npm install
          npm audit --audit-level=low
        continue-on-error: true

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit (Tauri)
        working-directory: apps/tauri-v2/src-tauri
        run: cargo audit
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-update:
    name: Check for Dependency Updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for npm updates (Tauri)
        working-directory: apps/tauri-v2
        run: |
          npm install
          npm outdated || true

      - name: Check for cargo updates (Tauri)
        working-directory: apps/tauri-v2/src-tauri
        run: |
          cargo install cargo-outdated
          cargo outdated || true
